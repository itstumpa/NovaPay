name: CI Pipeline

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'     
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check          
        run: npx tsc --noEmit

      - name: Build             
        run: npm run build